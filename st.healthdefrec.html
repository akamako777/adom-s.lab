<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Integration Ready -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14b8a6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stealth Defense Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Hiragino Maru Gothic ProN", "Yu Rounded", "Arial Rounded MT Bold", sans-serif;
            overscroll-behavior-y: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .stealth-active {
            background-color: #000 !important;
            color: #000 !important;
            user-select: none;
        }

        .clock-font {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-variant-numeric: tabular-nums;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* ホタル型インジケーター用アニメーション */
        @keyframes rec-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(16, 185, 129, 0); }
            50% { transform: scale(1.3); box-shadow: 0 0 10px rgba(16, 185, 129, 0.8); }
        }
        .indicator-recording {
            background-color: #10b981 !important; /* teal-500 */
            opacity: 0.8 !important;
            animation: rec-pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-[100dvh] flex flex-col relative overflow-hidden">

    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[100] transition-opacity duration-300 opacity-0 pointer-events-none flex items-center space-x-2">
        <span id="toast-icon">ℹ️</span>
        <span id="toast-msg">メッセージ</span>
    </div>

    <!-- 宣誓モーダル -->
    <div id="consent-modal" class="fixed inset-0 bg-gray-900/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm hidden">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full border border-gray-100 shadow-2xl">
            <h2 class="text-xl font-bold text-teal-600 mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span data-i18n="terms_title">利用規約と宣誓</span>
            </h2>
            <p class="text-sm text-gray-600 mb-4 font-medium" data-i18n="terms_desc">本アプリは自己防衛および証拠保全のみを目的とします。以下に同意してください。</p>
            <div class="space-y-4 mb-8">
                <label class="flex items-start space-x-3 cursor-pointer p-2 bg-gray-50 rounded-lg">
                    <input type="checkbox" id="chk-1" class="w-5 h-5 mt-0.5 rounded border-gray-300 text-teal-500 focus:ring-teal-500">
                    <span class="text-sm text-gray-700 leading-tight" data-i18n="terms_chk1">盗聴や悪意ある切り取り等の用途には絶対に使用しません。</span>
                </label>
                <label class="flex items-start space-x-3 cursor-pointer p-2 bg-gray-50 rounded-lg">
                    <input type="checkbox" id="chk-2" class="w-5 h-5 mt-0.5 rounded border-gray-300 text-teal-500 focus:ring-teal-500">
                    <span class="text-sm text-gray-700 leading-tight" data-i18n="terms_chk2">監視中は画面外でマイク使用マークが点灯することを理解しています。</span>
                </label>
            </div>
            <button id="btn-agree" class="w-full bg-gray-200 text-gray-400 py-3.5 rounded-2xl font-bold transition-all duration-300" disabled data-i18n="btn_agree">同意して次へ</button>
        </div>
    </div>

    <!-- PINモーダル -->
    <div id="pin-modal" class="fixed inset-0 bg-gray-900/80 z-50 flex flex-col items-center justify-center p-4 backdrop-blur-md hidden">
        <div class="bg-white p-8 rounded-[2rem] max-w-xs w-full shadow-2xl text-center">
            <h2 id="pin-title" class="text-2xl font-bold text-gray-800 mb-2">PIN</h2>
            <p id="pin-desc" class="text-sm text-gray-500 mb-6 font-medium">Description</p>
            <div class="flex justify-center space-x-4 mb-8">
                <div class="w-4 h-4 rounded-full bg-gray-200 pin-dot transition-colors duration-200"></div>
                <div class="w-4 h-4 rounded-full bg-gray-200 pin-dot transition-colors duration-200"></div>
                <div class="w-4 h-4 rounded-full bg-gray-200 pin-dot transition-colors duration-200"></div>
                <div class="w-4 h-4 rounded-full bg-gray-200 pin-dot transition-colors duration-200"></div>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-6" id="pin-numpad"></div>
            <button id="btn-pin-cancel" class="text-gray-400 text-sm py-2 px-4 rounded-lg hover:bg-gray-100 transition font-bold" data-i18n="btn_cancel">キャンセル</button>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="fixed inset-0 bg-gray-900/50 z-40 flex items-center justify-center p-4 backdrop-blur-sm hidden">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full shadow-2xl">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="text-2xl mr-2">⚙️</span> <span data-i18n="settings_title">設定</span>
            </h2>
            <div class="space-y-4 mb-6">
                <!-- 表示モード設定 -->
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2" data-i18n="settings_mode">監視中の画面表示</label>
                    <select id="mode-select" class="w-full bg-gray-50 border border-gray-200 text-gray-700 py-2 px-3 rounded-xl focus:outline-none focus:border-teal-500 font-bold">
                        <option value="pocket" data-i18n="mode_pocket">ポケット (完全ブラックアウト)</option>
                        <option value="desk" data-i18n="mode_desk">机上 (時計・天気カモフラージュ)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2" data-i18n="settings_lang">言語 (Language)</label>
                    <select id="lang-select" class="w-full bg-gray-50 border border-gray-200 text-gray-700 py-2 px-3 rounded-xl focus:outline-none focus:border-teal-500 font-bold">
                        <option value="ja">日本語</option>
                        <option value="en">English (US)</option>
                        <option value="zh-TW">繁體中文 (Taiwan)</option>
                        <option value="zh-CN">简体中文 (China)</option>
                        <option value="ko">한국어 (Korean)</option>
                        <option value="vi">Tiếng Việt (Vietnamese)</option>
                        <option value="tl">Tagalog (Filipino)</option>
                        <option value="es">Español (Spanish)</option>
                        <option value="pt">Português (Portuguese)</option>
                        <option value="fr">Français (French)</option>
                        <option value="de">Deutsch (German)</option>
                        <option value="hi">हिन्दी (Hindi)</option>
                    </select>
                </div>
                <div class="pt-2">
                    <button id="btn-reset-pin" class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">
                        <span data-i18n="settings_reset_pin">暗証番号(PIN)の再設定</span>
                    </button>
                </div>
            </div>
            <button id="btn-close-settings" class="w-full bg-teal-50 text-teal-600 py-3 rounded-xl font-bold hover:bg-teal-100 transition" data-i18n="btn_close">閉じる</button>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-view" class="flex-1 flex flex-col p-5 overflow-hidden hidden">
        <header class="flex justify-between items-center mb-4 pt-2 shrink-0">
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">Stealth<span class="text-teal-500">Def</span></h1>
            </div>
            <div class="flex space-x-2">
                <button id="btn-settings" class="bg-white border border-gray-200 p-2.5 rounded-xl shadow-sm hover:bg-gray-50 transition text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <button id="btn-vault" class="bg-teal-50 border border-teal-100 px-4 py-2.5 rounded-xl shadow-sm hover:bg-teal-100 transition flex items-center">
                    <span class="text-lg mr-1">🔒</span>
                    <span class="font-bold text-sm text-teal-700" data-i18n="nav_vault">録音データ</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto pb-4 custom-scrollbar">
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 mb-4 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-teal-400 rounded-l-3xl"></div>
                <h3 class="text-base font-bold text-gray-800 mb-4 flex items-center">
                    <span class="text-lg mr-2">🎛️</span> <span data-i18n="config_title">センサー設定</span>
                </h3>
                
                <!-- 【NEW】端末選択UI -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="config_device">使用端末 (Device)</label>
                    <div class="flex bg-gray-100 p-1 rounded-xl">
                        <button id="btn-dev-mobile" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-teal-600 transition-all duration-200" data-i18n="dev_mobile">スマホ</button>
                        <button id="btn-dev-pc" class="flex-1 py-2 text-xs font-bold rounded-lg text-gray-500 hover:text-gray-700 transition-all duration-200" data-i18n="dev_pc">パソコン</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div id="wrap-motion" class="bg-gray-50 p-3 rounded-xl border border-gray-100 transition-opacity duration-300">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-xs font-bold text-gray-600" data-i18n="config_motion">物理タップ</label>
                            <span id="val-motion" class="text-[10px] text-teal-600 font-bold bg-teal-100 px-1.5 py-0.5 rounded">普通</span>
                        </div>
                        <input type="range" id="slider-motion" min="1" max="3" step="1" value="2" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-teal-500">
                    </div>
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-xs font-bold text-gray-600" data-i18n="config_audio">環境音(声)</label>
                            <span id="val-audio" class="text-[10px] text-teal-600 font-bold bg-teal-100 px-1.5 py-0.5 rounded">普通</span>
                        </div>
                        <input type="range" id="slider-audio" min="1" max="3" step="1" value="2" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-teal-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1" data-i18n="config_autostop">自動録音停止 (無音状態が続いた場合)</label>
                    <select id="select-autostop" class="w-full bg-gray-50 border border-gray-200 text-gray-700 py-2 px-3 rounded-xl focus:outline-none focus:border-teal-500 text-sm font-bold">
                        <option value="60000" data-i18n="opt_1min">1分で停止して保存</option>
                        <option value="180000" data-i18n="opt_3min">3分で停止して保存</option>
                        <option value="0" data-i18n="opt_never">自動停止しない</option>
                    </select>
                </div>
            </div>
            
            <!-- 使い方と注意書き (ボタン上部に配置) -->
            <div class="px-1 mb-2">
                <div class="bg-blue-50/70 border border-blue-100 rounded-2xl p-3 text-center shadow-sm">
                    <p class="text-xs text-blue-800 font-black mb-1.5" data-i18n="info_bg_record">
                        ⚠️ バックグラウンド録音はできません
                    </p>
                    <p class="text-[11px] text-gray-600 font-medium leading-relaxed" data-i18n="info_usage">
                        「プロテクト開始」を押し、専用画面を開いたまま使用します。<br>
                        <span class="text-teal-600 font-bold">【ドラレコ機能】</span> トリガー発動時、直前の会話も遡って保存します。
                    </p>
                </div>
            </div>
        </div>

        <div class="shrink-0 pt-2 pb-8 flex justify-center">
            <button id="btn-stealth" class="w-40 h-40 rounded-full bg-gradient-to-br from-teal-400 to-blue-500 shadow-[0_8px_30px_rgba(20,184,166,0.3)] border-4 border-white flex flex-col items-center justify-center transform transition-all active:scale-95 relative overflow-hidden group">
                <div class="absolute inset-0 bg-white opacity-0 transition-opacity group-active:opacity-20"></div>
                <svg class="w-12 h-12 text-white mb-1 relative z-10 drop-shadow-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <span class="font-black text-white text-lg relative z-10 tracking-widest drop-shadow-sm" data-i18n="btn_start">プロテクト開始</span>
            </button>
        </div>
    </div>

    <!-- Vault画面 -->
    <div id="vault-view" class="fixed inset-0 bg-gray-50 z-40 hidden flex flex-col">
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm shrink-0">
            <button id="btn-vault-back" class="text-gray-500 hover:text-gray-800 p-2 bg-gray-100 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h2 class="text-lg font-bold text-gray-800 flex items-center">
                <span class="mr-2">📁</span> <span data-i18n="vault_title">証拠保管庫</span>
            </h2>
            <div class="w-10"></div>
        </header>
        <div class="bg-yellow-50 text-yellow-800 text-xs p-3 text-center font-bold border-b border-yellow-100 shrink-0" data-i18n="vault_notice">
            ⚠️ 録音データは安全のため10日で自動消去されます。
        </div>
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar" id="recordings-list"></div>
    </div>

    <!-- ステルススクリーン (オーバーレイ) -->
    <div id="stealth-screen" class="fixed inset-0 bg-black z-[200] hidden flex-col items-center justify-center stealth-active">
        
        <!-- 【NEW】ホタル型インジケーター (トリガー時のみ点滅) -->
        <div id="rec-indicator" class="absolute top-6 left-6 w-2.5 h-2.5 rounded-full bg-gray-800 opacity-20 z-50 transition-colors duration-300"></div>

        <!-- 【机上モード】 カモフラージュUI -->
        <div id="desk-ui" class="hidden flex-col items-center justify-center w-full h-full text-gray-300">
            <div class="flex flex-col items-center pointer-events-none select-none">
                <div id="clock-time" class="text-[5.5rem] leading-none font-light tracking-widest clock-font text-white opacity-90">00:00</div>
                <div id="clock-date" class="text-sm font-medium tracking-wide mt-2 text-gray-400 uppercase">YYYY/MM/DD DAY</div>
            </div>
            <div id="manual-trigger-desk" class="mt-12 flex items-center justify-center space-x-3 text-2xl select-none px-6 py-4 rounded-3xl active:bg-white/5 transition-colors duration-300">
                <span id="weather-icon" class="opacity-80">--</span>
                <span id="weather-temp" class="clock-font font-light text-gray-400 opacity-90">--°</span>
            </div>
        </div>

        <!-- 【ポケットモード】 -->
        <div id="manual-trigger-pocket" class="absolute inset-0 z-10 hidden"></div>

        <div id="stealth-hint" class="absolute bottom-10 w-full text-gray-500 text-xs font-bold text-center px-4 transition-opacity duration-1000 opacity-100 pointer-events-none">
            <span data-i18n="stealth_fade_hint">画面を素早く2回タップで解除</span>
        </div>
    </div>

    <!-- メインロジック -->
    <script>
        const CONFIG = {
            dbName: 'StealthDefDB_v4',
            storeName: 'recordings',
            retentionDays: 10,
            // 【手動調整用】物理タップの感度 (数値を小さくするほど敏感になる) [鈍感, 普通, 敏感]
            motionThresholds: [7, 3, 1.5], 
            // 【手動調整用】環境音の感度 スマホ用 (数値を大きくするほど鈍感) [鈍感, 普通, 敏感]
            mobileAudioThresholds: [80, 60, 50], 
            // 【手動調整用】環境音の感度 PC用 [鈍感, 普通, 敏感]
            pcAudioThresholds: [80, 60, 50],

        };

        const state = {

            motionLevel: 1, 
            audioLevel: 1,
            mediaRecorder: null, audioChunks: [], wakeLock: null, audioContext: null, analyser: null, micStream: null,
            tapCount: 0, lastTapTime: 0, idleStartMs: 0, lastLoudMs: 0,
            clockIntervalId: null,
            audioHistory: [],
            loudFrameCount: 0,
            stealthStartTime: 0, // V2.1: ウォームアップ判定用
            loudStartMs: 0, // 音声持続時間計測用
            lastAcc: { x: 0, y: 0, z: 0 }, // ジャーク計算用
            wakeLockTimer: null, // WakeLock監視用
            scriptProcessor: null // 【バックグラウンド対応】Audioイベント処理ノード
        };

        const UI = {
            toast: document.getElementById('toast'), toastIcon: document.getElementById('toast-icon'), toastMsg: document.getElementById('toast-msg'),

            stealthScreen: document.getElementById('stealth-screen'), stealthHint: document.getElementById('stealth-hint'),
            deskUi: document.getElementById('desk-ui'), clockTime: document.getElementById('clock-time'), clockDate: document.getElementById('clock-date'), weatherIcon: document.getElementById('weather-icon'), weatherTemp: document.getElementById('weather-temp'),
            manualTrigDesk: document.getElementById('manual-trigger-desk'), manualTrigPocket: document.getElementById('manual-trigger-pocket'),
            sliderMotion: document.getElementById('slider-motion'), sliderAudio: document.getElementById('slider-audio'), valMotion: document.getElementById('val-motion'), valAudio: document.getElementById('val-audio'),
            selectAutoStop: document.getElementById('select-autostop'), recordingsList: document.getElementById('recordings-list'),
            btnDevMobile: document.getElementById('btn-dev-mobile'), btnDevPc: document.getElementById('btn-dev-pc'), wrapMotion: document.getElementById('wrap-motion'),
            recIndicator: document.getElementById('rec-indicator')

        function showToast(msgKey, type = 'info', isDirectMsg = false) {
            UI.toastMsg.textContent = isDirectMsg ? msgKey : t(msgKey);
            UI.toastIcon.textContent = type === 'error' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';
            UI.toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4'); UI.toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { UI.toast.classList.remove('opacity-100', 'translate-y-0'); UI.toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4'); }, 3000);
        }
        function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }
        function updateSliders() {
            state.motionLevel = parseInt(UI.sliderMotion.value) - 1; state.audioLevel = parseInt(UI.sliderAudio.value) - 1;
            const levels = ['lvl_1', 'lvl_2', 'lvl_3']; UI.valMotion.textContent = t(levels[state.motionLevel]); UI.valAudio.textContent = t(levels[state.audioLevel]);
        }
        function updateDeviceUI() {
            if (state.deviceType === 'pc') {
                UI.btnDevPc.classList.replace('text-gray-500', 'text-teal-600'); UI.btnDevPc.classList.add('bg-white', 'shadow-sm');
                UI.btnDevMobile.classList.replace('text-teal-600', 'text-gray-500'); UI.btnDevMobile.classList.remove('bg-white', 'shadow-sm');
                UI.wrapMotion.classList.add('opacity-40', 'pointer-events-none'); // PCは物理タップ無効
            } else {
                UI.btnDevMobile.classList.replace('text-gray-500', 'text-teal-600'); UI.btnDevMobile.classList.add('bg-white', 'shadow-sm');
                UI.btnDevPc.classList.replace('text-teal-600', 'text-gray-500'); UI.btnDevPc.classList.remove('bg-white', 'shadow-sm');
                UI.wrapMotion.classList.remove('opacity-40', 'pointer-events-none');
            }
        }

        const DB = {
            db: null,
            init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(CONFIG.dbName, 1);
                    req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains(CONFIG.storeName)) db.createObjectStore(CONFIG.storeName, { keyPath: 'id' }); };
                    req.onsuccess = (e) => { this.db = e.target.result; this.cleanOldRecords(); resolve(); };
                    req.onerror = (e) => reject(e.target.error);
                });
            },
            save(blob, durationStr, ext) {
                return new Promise((resolve, reject) => {
                    const now = new Date(); const id = now.getTime();
                    // V2.1: 拡張子を引数で受け取るように修正（.mp4 または .webm）
                    const filename = `DEFENSE-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.${ext}`;
                    const tx = this.db.transaction(CONFIG.storeName, 'readwrite'); const store = tx.objectStore(CONFIG.storeName);
                    const req = store.add({ id, blob, filename, date: now.toISOString(), duration: durationStr });
                    req.onsuccess = () => resolve(); req.onerror = () => reject(req.error);
                });
            },
            getAll() {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(CONFIG.storeName, 'readonly'); const store = tx.objectStore(CONFIG.storeName);
                    const req = store.getAll(); req.onsuccess = () => resolve(req.result.sort((a,b) => b.id - a.id)); req.onerror = () => reject(req.error);
                });
            },
            delete(id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(CONFIG.storeName, 'readwrite'); const store = tx.objectStore(CONFIG.storeName);
                    const req = store.delete(id); req.onsuccess = () => resolve(); req.onerror = () => reject();
                });
            },
            cleanOldRecords() {
                const limitDate = new Date(); limitDate.setDate(limitDate.getDate() - CONFIG.retentionDays); const limitTs = limitDate.getTime();
                const tx = this.db.transaction(CONFIG.storeName, 'readwrite'); const store = tx.objectStore(CONFIG.storeName); const req = store.openCursor();
                req.onsuccess = (e) => { const cursor = e.target.result; if (cursor) { if (cursor.value.id < limitTs) store.delete(cursor.primaryKey); cursor.continue(); } };
            }
        };

        const PIN = {
            currentInput: '', mode: 'auth', onSuccess: null,
            init() {
                UI.pinNumpad.innerHTML = '';
                [1,2,3,4,5,6,7,8,9,'',0,'del'].forEach(n => {
                    const btn = document.createElement('button');
                    if (n === '') { btn.className = 'invisible'; }
                    else if (n === 'del') {
                        btn.innerHTML = `<svg class="w-7 h-7 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path></svg>`;
                        btn.className = 'h-16 bg-gray-100 text-gray-600 rounded-2xl active:bg-gray-200 flex items-center justify-center transition'; btn.onclick = () => this.input('del');
                    } else {
                        btn.textContent = n; btn.className = 'h-16 bg-gray-100 text-2xl font-black text-gray-800 rounded-2xl active:bg-gray-200 transition'; btn.onclick = () => this.input(n.toString());
                    }
                    UI.pinNumpad.appendChild(btn);
                });
            },
            open(mode, successCallback) {
                this.mode = mode; this.onSuccess = successCallback; this.currentInput = ''; this.updateDots();
                UI.pinTitle.textContent = t(mode === 'setup' ? 'pin_setup_title' : 'pin_auth_title'); UI.pinDesc.textContent = t(mode === 'setup' ? 'pin_setup_desc' : 'pin_auth_desc');
                if (mode === 'setup' && !state.pin) UI.btnPinCancel.classList.add('hidden'); else UI.btnPinCancel.classList.remove('hidden');
                UI.pinModal.classList.remove('hidden');
            },
            close() { UI.pinModal.classList.add('hidden'); },
            input(val) {
                if (val === 'del') this.currentInput = this.currentInput.slice(0, -1); else if (this.currentInput.length < 4) this.currentInput += val;
                this.updateDots(); if (this.currentInput.length === 4) setTimeout(() => this.check(), 100);
            },
            updateDots() { UI.pinDots.forEach((dot, i) => { if (i < this.currentInput.length) dot.classList.replace('bg-gray-200', 'bg-teal-500'); else dot.classList.replace('bg-teal-500', 'bg-gray-200'); }); },
            check() {
                if (this.mode === 'setup') { state.pin = this.currentInput; localStorage.setItem('stealth_pin', state.pin); showToast('msg_pin_set', 'success'); this.close(); if (this.onSuccess) this.onSuccess(); }
                else if (this.mode === 'auth') {
                    if (this.currentInput === state.pin) { this.close(); if (this.onSuccess) this.onSuccess(); }
                    else { showToast('msg_pin_err', 'error'); this.currentInput = ''; this.updateDots(); const box = UI.pinModal.firstElementChild; box.classList.add('animate-pulse'); setTimeout(() => box.classList.remove('animate-pulse'), 500); }
                }
            }
        };

        function checkInitFlow() {
            if (!localStorage.getItem('stealth_consent')) {
                UI.consentModal.classList.remove('hidden');
                const checkConsent = () => {
                    const allChecked = UI.chks.every(chk => chk.checked); UI.btnAgree.disabled = !allChecked;
                    if (allChecked) { UI.btnAgree.classList.replace('bg-gray-200', 'bg-teal-600'); UI.btnAgree.classList.replace('text-gray-400', 'text-white'); } 
                    else { UI.btnAgree.classList.replace('bg-teal-600', 'bg-gray-200'); UI.btnAgree.classList.replace('text-white', 'text-gray-400'); }
                };
                UI.chks.forEach(chk => chk.addEventListener('change', checkConsent));
                
                UI.btnAgree.onclick = async () => { 
                    try {
                        UI.btnAgree.innerHTML = '<span class="animate-pulse">' + t('btn_agree') + '...</span>';
                        UI.btnAgree.disabled = true;
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        stream.getTracks().forEach(track => track.stop());
                        localStorage.setItem('stealth_consent', 'true'); 
                        UI.consentModal.classList.add('hidden'); 
                        checkInitFlow(); 
                    } catch (err) {
                        showToast('msg_mic_err', 'error');
                        UI.btnAgree.innerHTML = t('btn_agree');
                        UI.btnAgree.disabled = false;
                    }
                };
                return;
            }
            if (!state.pin) { PIN.open('setup', () => checkInitFlow()); return; }
            UI.mainView.classList.remove('hidden');
        }

        // --- Camouflage UI (Clock & Weather) ---
        function updateClock() {
            if (!state.isStealth || state.displayMode !== 'desk') return;
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            UI.clockTime.textContent = `${h}:${m}`;
            
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            const locMap = {
                'ja': 'ja-JP', 'en': 'en-US', 'zh-TW': 'zh-TW', 'zh-CN': 'zh-CN',
                'ko': 'ko-KR', 'vi': 'vi-VN', 'tl': 'fil-PH', 'de': 'de-DE',
                'es': 'es-ES', 'hi': 'hi-IN', 'fr': 'fr-FR', 'pt': 'pt-BR'
            };
            const loc = locMap[currentLang] || 'en-US';
            UI.clockDate.textContent = now.toLocaleDateString(loc, options).replace(/\//g, ' / ');
        }

        async function fetchWeather() {
            if (state.displayMode !== 'desk') return;
            try {
                const geoRes = await fetch('https://get.geojs.io/v1/ip/geo.json');
                if (!geoRes.ok) throw new Error();
                const geoData = await geoRes.json();
                
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geoData.latitude}&longitude=${geoData.longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();
                const temp = Math.round(weatherData.current_weather.temperature);
                const code = weatherData.current_weather.weathercode;
                
                let icon = '☁️';
                if (code === 0) icon = '☀️';
                else if (code <= 3) icon = '⛅';
                else if (code <= 48) icon = '🌫️';
                else if (code <= 67) icon = '🌧️';
                else if (code <= 77) icon = '❄️';
                else if (code >= 95) icon = '⛈️';

                UI.weatherIcon.textContent = icon;
                UI.weatherTemp.textContent = `${temp}°`;
            } catch (e) {
                UI.weatherIcon.textContent = '--'; UI.weatherTemp.textContent = '--°';
            }
        }

        // --- Handled Long Press (手動トリガー) ---
        function setupManualTrigger(element) {
            let pressTimer;
            element.addEventListener('pointerdown', (e) => {
                pressTimer = setTimeout(() => { fireTrigger("manual"); }, 1000); 
            });
            const cancelPress = () => clearTimeout(pressTimer);
            element.addEventListener('pointerup', cancelPress);
            element.addEventListener('pointerleave', cancelPress);
            element.addEventListener('pointercancel', cancelPress);
        }

        function setIndicatorState(isActive) {
            if (isActive) {
                UI.recIndicator.classList.add('indicator-recording');
                UI.recIndicator.classList.remove('bg-gray-800', 'opacity-20');
            } else {
                UI.recIndicator.classList.remove('indicator-recording');
                UI.recIndicator.classList.add('bg-gray-800', 'opacity-20');
            }
        }

        // --- Core Audio Logic ---
        function startRecordingCycle() {
            // 不死鳥ループの安全装置: すでに録画中ならスキップ
            if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') return;

            state.audioChunks = [];
            let mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
            let ext = mimeType.includes('mp4') ? 'mp4' : 'webm';

            state.mediaRecorder = new MediaRecorder(state.micStream, { mimeType });
            state.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) state.audioChunks.push(e.data); };
            
            state.mediaRecorder.onstop = async () => {
                const chunks = state.audioChunks;
                const wasTriggered = (state.recorderMode === 'triggered');
                const startMs = state.idleStartMs;
                
                if (wasTriggered) {
                    const blob = new Blob(chunks, { type: mimeType });
                    const d = Date.now() - startMs;
                    const dur = Math.floor(d/60000) + ":" + String(Math.floor((d%60000)/1000)).padStart(2,'0');
                    await DB.save(blob, dur, ext).catch(e=>console.error(e));
                    showToast('msg_saved', 'success');
                }
                if (state.isStealth) startRecordingCycle();
            };

            state.idleStartMs = Date.now();
            state.recorderMode = 'idle';
            setIndicatorState(false); // 待機状態に戻す
            state.mediaRecorder.start();
        }

        function fireTrigger(src) {
            if (state.recorderMode === 'idle') {
                state.recorderMode = 'triggered';
                state.lastLoudMs = Date.now();
                setIndicatorState(true); // ホタル点滅開始
                vibrate([200]); 
                if(src === 'manual') showToast('manual_trig', 'info'); 
            } else if (src === 'tap' || src === 'manual') {
                state.mediaRecorder.stop(); 
                vibrate([100, 100, 100]);
            }
        }

        async function acquireWakeLock() {
            if ('wakeLock' in navigator && state.isStealth) {
                try {
                    if (state.wakeLock) {
                        state.wakeLock.release().catch(()=>{});
                    }
                    state.wakeLock = await navigator.wakeLock.request('screen');
                    console.log('WakeLock acquired (Phoenix)');
                } catch (err) {
                    console.log('WakeLock acquisition failed', err);
                }
            }
        }

        async function startStealthMode() {
            try {
                state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission !== 'granted') throw new Error('Motion denied');
                }
            } catch (err) { showToast('msg_mic_err', 'error'); return; }

            state.isStealth = true;
            state.stealthStartTime = Date.now(); // V2.1: ウォームアップタイマー開始
            
            await acquireWakeLock(); 

            state.audioHistory = [];
            state.loudFrameCount = 0;
            state.loudStartMs = 0;
            state.lastAcc = { x: 0, y: 0, z: 0 };
            setIndicatorState(false); // 初期化時は消灯

            // WakeLock不死鳥ループ: 定期的にロック状態を監視・再取得
            state.wakeLockTimer = setInterval(async () => {
                if (state.isStealth && (!state.wakeLock || state.wakeLock.released)) {
                    await acquireWakeLock();
                }
            }, 5000);

            UI.stealthScreen.classList.remove('hidden');
            UI.stealthScreen.classList.replace('flex-col', 'flex'); 
            
            if (state.displayMode === 'desk') {
                UI.deskUi.classList.remove('hidden');
                UI.deskUi.classList.add('flex');
                UI.manualTrigPocket.classList.add('hidden');
                updateClock();
                state.clockIntervalId = setInterval(updateClock, 1000);
                fetchWeather(); 
            } else {
                UI.deskUi.classList.add('hidden');
                UI.deskUi.classList.remove('flex');
                UI.manualTrigPocket.classList.remove('hidden');
            }

            UI.stealthHint.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { UI.stealthHint.classList.replace('opacity-100', 'opacity-0'); }, 3500);
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            state.audioContext = new AudioContext();
            const source = state.audioContext.createMediaStreamSource(state.micStream);
            const filter = state.audioContext.createBiquadFilter();
            filter.type = 'bandpass'; filter.frequency.value = 1000; filter.Q.value = 1.0;
            state.analyser = state.audioContext.createAnalyser(); state.analyser.fftSize = 512;
            source.connect(filter); filter.connect(state.analyser);

            // 【バックグラウンド常駐パッチ】: ScriptProcessorによるオーディオイベント駆動
            // 画面の描画処理(requestAnimationFrame)が止まる別タブ状態でも、
            // マイクから音声データが流れてくるたびに強制的に監視処理を実行させる。
            state.scriptProcessor = state.audioContext.createScriptProcessor(2048, 1, 1);
            state.scriptProcessor.onaudioprocess = function() {
                if (state.isStealth) monitorAudio();
            };
            state.analyser.connect(state.scriptProcessor);
            // 音声を出力先(destination)に繋ぐことでバックグラウンド処理を維持。
            // ※ScriptProcessor自体は何も出力しない(空バッファ)ため、ハウリング(フィードバック)は起きない。
            state.scriptProcessor.connect(state.audioContext.destination);

            window.addEventListener('devicemotion', handleMotion);
            startRecordingCycle();
        }

        function stopStealthMode() {
            state.isStealth = false;
            UI.stealthScreen.classList.add('hidden');
            window.removeEventListener('devicemotion', handleMotion);
            if (state.clockIntervalId) clearInterval(state.clockIntervalId);
            if (state.wakeLockTimer) clearInterval(state.wakeLockTimer);
            
            if (state.scriptProcessor) {
                state.scriptProcessor.disconnect();
                state.scriptProcessor = null;
            }
            if (state.audioContext) state.audioContext.close();
            
            if (state.mediaRecorder?.state !== 'inactive') state.mediaRecorder.stop();
            
            if (state.micStream) {
                state.micStream.getTracks().forEach(track => track.stop());
                state.micStream = null;
            }

            if (state.wakeLock) { state.wakeLock.release().catch(()=>{}); state.wakeLock = null; }
            setIndicatorState(false);
            vibrate([100, 50, 100]);
            showToast('msg_stealth_end');
        }

        function handleMotion(e) {
            if (!e.acceleration || state.deviceType === 'pc') return; // PCモードでは物理タップを完全に無効化
            
            // ウォームアップ期間中は無効化
            if (Date.now() - state.stealthStartTime < CONFIG.warmupMs) return;

            const acc = e.acceleration;
            // 揺れ(重力や歩行)を排除し、直前のフレームとの差分(ジャーク/衝撃波)のみを抽出
            const dx = acc.x - state.lastAcc.x;
            const dy = acc.y - state.lastAcc.y;
            const dz = acc.z - state.lastAcc.z;
            state.lastAcc = { x: acc.x || 0, y: acc.y || 0, z: acc.z || 0 };

            const jerk = Math.sqrt(dx*dx + dy*dy + dz*dz);
            
            if (jerk > CONFIG.motionThresholds[state.motionLevel]) {
                const now = Date.now();
                // 極端に連続する波を1回のタップとして扱うためのデバウンス(150ms)
                if (now - state.lastTapTime > 150) {
                    state.tapCount++; state.lastTapTime = now;
                    // 3回の鋭い衝撃があった場合のみトリガー
                    if (state.tapCount >= 3) { fireTrigger("tap"); state.tapCount = 0; }
                }
            }
            // CONFIGで設定した時間以上間隔が空いたらカウントリセット
            if (Date.now() - state.lastTapTime > CONFIG.tapTimeWindowMs) state.tapCount = 0;
        }

        function monitorAudio() {
            // ※requestAnimationFrameを削除し、ScriptProcessorから直接呼ばれるように変更
            const dataArray = new Uint8Array(state.analyser.frequencyBinCount);
            state.analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
            const rms = Math.sqrt(sum / dataArray.length);
            const now = Date.now();
            
            state.audioHistory.push(rms);
            if (state.audioHistory.length > CONFIG.historyMaxFrames) {
                state.audioHistory.shift();
            }

            // V2.1: ウォームアップ期間（開始から3秒）はベースラインの計算のみ行い、トリガーは無視する
            const isWarmup = (now - state.stealthStartTime < CONFIG.warmupMs);

            // デバイスごとに設定されたしきい値を適用
            let threshold = (state.deviceType === 'pc') 
                ? CONFIG.pcAudioThresholds[state.audioLevel] 
                : CONFIG.mobileAudioThresholds[state.audioLevel];
            
            let isTriggeredNow = false;

            if (!isWarmup) {
                // ボイスレコーダー化の阻止: 一瞬のスパイクではなく「持続性」を評価する
                if (rms > threshold) {
                    if (state.loudStartMs === 0) state.loudStartMs = now;
                    // PCモードは少し長め(600ms)、スマホは標準(400ms) 大音量が継続した場合に判定
                    const requiredDuration = (state.deviceType === 'pc') ? 600 : 400;
                    if (now - state.loudStartMs > requiredDuration) {
                        isTriggeredNow = true;
                    }
                } else {
                    // 少しでも静かになったら持続タイマーをリセット
                    state.loudStartMs = 0;
                }
            }

            if (state.recorderMode === 'idle') {
                if (isTriggeredNow) {
                    fireTrigger("audio");
                } else if (now - state.idleStartMs > CONFIG.idleRotationMs) {
                    state.mediaRecorder.stop();
                }
            } else if (state.recorderMode === 'triggered') {
                if (isTriggeredNow || rms > threshold * 0.8) { 
                    state.lastLoudMs = now;
                } else {
                    const autoStopMs = parseInt(UI.selectAutoStop.value);
                    if (autoStopMs > 0 && (now - state.lastLoudMs > autoStopMs)) {
                        state.mediaRecorder.stop();
                        vibrate([100, 100, 100]); 
                    }
                }
            }
        }

        // --- Vault ---
        async function loadVault() {
            UI.recordingsList.innerHTML = '<div class="flex justify-center mt-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-teal-500"></div></div>';
            try {
                const records = await DB.getAll();
                if (records.length === 0) {
                    UI.recordingsList.innerHTML = `<div class="flex items-center justify-center h-full text-gray-400 flex-col pt-10"><span class="text-4xl mb-4 grayscale opacity-50">📂</span><p class="font-bold">${t('vault_empty')}</p></div>`;
                    return;
                }
                UI.recordingsList.innerHTML = '';
                records.forEach(rec => {
                    const item = document.createElement('div'); item.className = 'bg-white p-4 rounded-2xl mb-3 border border-gray-100 flex flex-col shadow-sm';
                    const url = URL.createObjectURL(rec.blob);
                    
                    // UXリニューアル: 情報とボタンを上段に、再生バーを横幅いっぱいの下段に配置
                    item.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1 truncate mr-2">
                                <h4 class="text-gray-800 font-mono text-xs font-bold truncate">${rec.filename}</h4>
                                <p class="text-[11px] text-gray-500 mt-1">${new Date(rec.date).toLocaleString()} • ${rec.duration}</p>
                            </div>
                            <div class="flex space-x-2 shrink-0">
                                <button class="btn-dl p-2 bg-teal-50 text-teal-600 rounded-xl hover:bg-teal-100 transition" data-url="${url}" data-fn="${rec.filename}">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                </button>
                                <button class="btn-del flex items-center justify-center p-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-all duration-300 overflow-hidden" data-id="${rec.id}">
                                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    <span class="del-text max-w-0 opacity-0 whitespace-nowrap transition-all duration-300 text-[10px] font-bold ml-0"></span>
                                </button>
                            </div>
                        </div>
                        <div class="w-full">
                            <audio src="${url}" controls class="h-10 w-full outline-none" preload="none"></audio>
                        </div>
                    `;
                    UI.recordingsList.appendChild(item);
                });
                
                document.querySelectorAll('.btn-dl').forEach(btn => { 
                    btn.onclick = () => { const a = document.createElement('a'); a.href = btn.dataset.url; a.download = btn.dataset.fn; a.click(); }; 
                });
                
                // UXリニューアル: 削除ボタンのトランジション警告機能
                document.querySelectorAll('.btn-del').forEach(btn => {
                    btn.onclick = async () => {
                        const textSpan = btn.querySelector('.del-text');
                        if (btn.dataset.confirm === 'yes') { 
                            await DB.delete(parseInt(btn.dataset.id)); loadVault(); showToast('msg_deleted'); 
                        } else { 
                            btn.dataset.confirm = 'yes'; 
                            btn.classList.replace('text-red-600', 'text-white'); 
                            btn.classList.replace('bg-red-50', 'bg-red-500');
                            btn.classList.add('px-3');
                            textSpan.textContent = t('btn_del_confirm');
                            textSpan.classList.remove('max-w-0', 'opacity-0', 'ml-0');
                            textSpan.classList.add('max-w-[150px]', 'opacity-100', 'ml-1.5');
                            
                            setTimeout(() => { 
                                // 要素がDOM上にまだ存在する場合のみ戻す(削除完了後にエラーを出さないため)
                                if (document.body.contains(btn)) {
                                    btn.dataset.confirm = 'no'; 
                                    btn.classList.replace('text-white', 'text-red-600'); 
                                    btn.classList.replace('bg-red-500', 'bg-red-50'); 
                                    btn.classList.remove('px-3');
                                    textSpan.classList.add('max-w-0', 'opacity-0', 'ml-0');
                                    textSpan.classList.remove('max-w-[150px]', 'opacity-100', 'ml-1.5');
                                }
                            }, 3000); 
                        }
                    };
                });
            } catch (e) { console.error(e); }
        }

        async function bootApp() {
            UI.langSelect.value = currentLang;
            UI.modeSelect.value = state.displayMode;
            updateDeviceUI(); // 初期表示
            applyTranslations();

            await DB.init().catch(e => showToast('DB Init Error', 'error', true));
            PIN.init(); checkInitFlow(); 

            // デバイス切り替えボタン
            UI.btnDevMobile.onclick = () => { state.deviceType = 'mobile'; localStorage.setItem('stealth_device_type', 'mobile'); updateDeviceUI(); };
            UI.btnDevPc.onclick = () => { state.deviceType = 'pc'; localStorage.setItem('stealth_device_type', 'pc'); updateDeviceUI(); };

            UI.sliderMotion.addEventListener('input', updateSliders);
            UI.sliderAudio.addEventListener('input', updateSliders);

            UI.btnStealth.onclick = () => startStealthMode();

            let taps = 0, tapTimer;
            UI.stealthScreen.addEventListener('pointerup', (e) => {
                if (e.target.closest('#manual-trigger-desk')) return; 
                taps++; clearTimeout(tapTimer);
                if (taps >= 2) { stopStealthMode(); taps = 0; }
                else tapTimer = setTimeout(() => { taps = 0; }, 400);
            });

            setupManualTrigger(UI.manualTrigDesk);
            setupManualTrigger(UI.manualTrigPocket);

            UI.btnVault.onclick = () => { PIN.open('auth', () => { UI.vaultView.classList.remove('hidden'); loadVault(); }); };
            UI.btnVaultBack.onclick = () => { UI.vaultView.classList.add('hidden'); document.querySelectorAll('audio').forEach(a => URL.revokeObjectURL(a.src)); };

            UI.btnSettings.onclick = () => UI.settingsModal.classList.remove('hidden');
            UI.btnCloseSettings.onclick = () => UI.settingsModal.classList.add('hidden');
            
            UI.langSelect.addEventListener('change', (e) => { currentLang = e.target.value; localStorage.setItem('stealth_lang', currentLang); applyTranslations(); });
            UI.modeSelect.addEventListener('change', (e) => { state.displayMode = e.target.value; localStorage.setItem('stealth_display_mode', state.displayMode); });

            UI.btnResetPin.onclick = () => { UI.settingsModal.classList.add('hidden'); PIN.open('setup'); };
            UI.btnPinCancel.onclick = () => PIN.close();

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && state.isStealth) {
                    acquireWakeLock();
                }
            });

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js').catch((err) => {
                        console.log('PWA mode standby: sw.js not found yet.');
                    });
                });
            }
        }

        window.addEventListener('DOMContentLoaded', bootApp);
    </script>
</body>
