<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroScan Omni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base styles */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1a1a; color: #f3f4f6; overscroll-behavior-y: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Loading Spinner */
        .loader { border: 4px solid #374151; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Canvas interaction layer */
        #crop-container { position: relative; width: 100%; height: calc(100vh - 200px); background: #000; touch-action: none; overflow: hidden; display: flex; justify-content: center; align-items: center;}
        #image-canvas { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Magnifier (ルーペ) */
        #magnifier { position: absolute; width: 100px; height: 100px; border: 3px solid #3b82f6; border-radius: 50%; background-color: #000; pointer-events: none; display: none; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 50; }
        #magnifier-canvas { width: 100%; height: 100%; }
        #magnifier-crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; }
        #magnifier-crosshair::before { content: ''; position: absolute; top: 50%; left: -5px; right: -5px; height: 1px; background: rgba(59, 130, 246, 0.8); }
        #magnifier-crosshair::after { content: ''; position: absolute; left: 50%; top: -5px; bottom: -5px; width: 1px; background: rgba(59, 130, 246, 0.8); }

        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #4b5563; border-radius: 2px; }

        /* Hidden file input */
        #file-input { display: none; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">

    <!-- Screen 1: Home -->
    <div id="screen-home" class="flex-1 flex flex-col items-center justify-center p-6 space-y-8 absolute inset-0 z-10 bg-gray-900">
        <div class="text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">RetroScan Omni</h1>
            <p class="text-gray-400 text-sm">古い写真をスマホでスキャン＆補正</p>
        </div>
        
        <div class="w-full max-w-sm space-y-4">
            <button id="btn-camera" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl flex items-center justify-center space-x-3 transition-colors shadow-lg shadow-blue-900/50">
                <i class="fas fa-camera text-2xl"></i>
                <span class="text-lg font-medium">カメラでスキャン</span>
            </button>
            <button id="btn-file" class="w-full py-4 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-2xl flex items-center justify-center space-x-3 transition-colors">
                <i class="fas fa-images text-xl"></i>
                <span class="text-lg font-medium">写真を選択 (複数可)</span>
            </button>
            <input type="file" id="file-input" accept="image/*" multiple>
        </div>
        
        <div class="mt-8 text-center text-xs text-gray-500">
            <p><i class="fas fa-shield-alt mr-1"></i>画像はサーバーに送信されず、すべて端末内で処理されます。</p>
        </div>
    </div>

    <!-- Screen 2: Edit/Crop -->
    <div id="screen-edit" class="flex-1 flex flex-col absolute inset-0 z-20 bg-gray-900 hidden">
        <!-- Header -->
        <div class="h-14 bg-gray-900 flex justify-between items-center px-4 border-b border-gray-800">
            <button id="btn-edit-cancel" class="text-gray-400 hover:text-white px-2 py-1"><i class="fas fa-times text-xl"></i></button>
            <div class="text-sm font-medium" id="edit-counter">1 / 1</div>
            <button id="btn-edit-done" class="text-blue-400 font-bold px-2 py-1 hover:text-blue-300">次へ <i class="fas fa-arrow-right ml-1"></i></button>
        </div>

        <!-- Working Area -->
        <div id="crop-container" class="flex-1">
            <canvas id="image-canvas"></canvas>
            <canvas id="ui-canvas"></canvas>
            <div id="magnifier">
                <canvas id="magnifier-canvas"></canvas>
                <div id="magnifier-crosshair"></div>
            </div>
        </div>

        <!-- Tools Area -->
        <div class="h-auto pb-6 pt-4 bg-gray-900 border-t border-gray-800 px-4 space-y-4">
            <div class="flex justify-around">
                <button class="tool-btn flex flex-col items-center space-y-1 text-blue-400" data-tool="crop">
                    <i class="fas fa-crop-alt text-xl"></i>
                    <span class="text-[10px]">切り抜き</span>
                </button>
                <button class="tool-btn flex flex-col items-center space-y-1 text-gray-400" data-tool="filter">
                    <i class="fas fa-magic text-xl"></i>
                    <span class="text-[10px]">エフェクト</span>
                </button>
                <button id="btn-rotate" class="flex flex-col items-center space-y-1 text-gray-400 active:text-white">
                    <i class="fas fa-undo text-xl"></i>
                    <span class="text-[10px]">回転</span>
                </button>
            </div>

            <!-- Effect Options (Hidden by default) -->
            <div id="effect-options" class="hidden flex justify-around pt-2 border-t border-gray-800">
                <button class="effect-btn px-3 py-1 rounded-full text-sm bg-blue-600 text-white" data-effect="none">標準</button>
                <button class="effect-btn px-3 py-1 rounded-full text-sm bg-gray-800 text-gray-300 border border-gray-700" data-effect="color-revive">退色復元 <i class="fas fa-sparkles text-yellow-400 ml-1"></i></button>
                <button class="effect-btn px-3 py-1 rounded-full text-sm bg-gray-800 text-gray-300 border border-gray-700" data-effect="grayscale">白黒</button>
            </div>
            
            <div class="text-center text-xs text-gray-500 pt-1" id="tool-hint">四隅の青い丸をドラッグして、写真の枠に合わせてください</div>
        </div>
    </div>

    <!-- Screen 3: Gallery -->
    <div id="screen-gallery" class="flex-1 flex flex-col absolute inset-0 z-30 bg-gray-900 hidden">
        <div class="h-14 bg-gray-900 flex justify-between items-center px-4 border-b border-gray-800 shadow-md">
            <button id="btn-gallery-back" class="text-gray-400 hover:text-white px-2 py-1"><i class="fas fa-chevron-left text-xl"></i></button>
            <div class="text-sm font-bold">スキャン結果 (<span id="gallery-count">0</span>)</div>
            <div class="w-8"></div> <!-- Spacer -->
        </div>

        <div class="flex-1 overflow-y-auto p-4 hide-scrollbar pb-48">
            <div id="gallery-grid" class="grid grid-cols-2 gap-4">
                <!-- Gallery items will be injected here -->
            </div>
        </div>

        <!-- Export Toolbar -->
        <div class="absolute bottom-0 left-0 w-full bg-gray-800 border-t border-gray-700 p-4 pb-8 rounded-t-2xl shadow-[0_-10px_20px_rgba(0,0,0,0.3)]">
            
            <!-- 追加スキャン機能 -->
            <div class="flex space-x-3 mb-4">
                <button id="btn-add-camera" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm text-white font-medium flex items-center justify-center transition-colors border border-gray-600"><i class="fas fa-camera mr-2"></i>カメラ追加</button>
                <button id="btn-add-file" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm text-white font-medium flex items-center justify-center transition-colors border border-gray-600"><i class="fas fa-images mr-2"></i>写真追加</button>
            </div>

            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-2">保存画質</label>
                <div class="flex bg-gray-900 rounded-lg p-1">
                    <button class="quality-btn flex-1 py-1 text-xs sm:text-sm rounded-md bg-blue-600 text-white font-medium" data-size="3000" data-quality="1.0">超高画質</button>
                    <button class="quality-btn flex-1 py-1 text-xs sm:text-sm rounded-md text-gray-400" data-size="2000" data-quality="0.9">高画質</button>
                    <button class="quality-btn flex-1 py-1 text-xs sm:text-sm rounded-md text-gray-400" data-size="1200" data-quality="0.8">ふつう</button>
                    <button class="quality-btn flex-1 py-1 text-xs sm:text-sm rounded-md text-gray-400" data-size="800" data-quality="0.7">低画質</button>
                </div>
            </div>
            <div class="flex space-x-3">
                <button id="btn-export-zip" class="flex-1 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 rounded-xl font-bold text-white shadow-lg flex items-center justify-center">
                    <i class="fas fa-file-zipper mr-2 text-lg"></i> ZIPで一括保存
                </button>
            </div>
        </div>
    </div>

    <!-- UI Overlay: Loading -->
    <div id="loading-overlay" class="absolute inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p id="loading-text" class="text-white font-medium tracking-wide">処理中...</p>
    </div>

    <!-- UI Overlay: Custom Modal (Confirm代わり) -->
    <div id="custom-modal" class="absolute inset-0 bg-black/70 z-50 hidden items-center justify-center p-4">
        <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-gray-700 scale-95 transition-transform duration-200" id="modal-content">
            <h3 id="modal-title" class="text-xl font-bold mb-2">確認</h3>
            <p id="modal-desc" class="text-gray-400 mb-6 text-sm leading-relaxed"></p>
            <div class="flex justify-end space-x-3">
                <button id="modal-btn-cancel" class="px-4 py-2 rounded-lg bg-gray-700 text-white font-medium hover:bg-gray-600">キャンセル</button>
                <button id="modal-btn-ok" class="px-4 py-2 rounded-lg bg-red-600 text-white font-medium hover:bg-red-500">OK</button>
            </div>
        </div>
    </div>

    <!-- UI Overlay: Toast -->
    <div id="toast" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg z-50 text-sm font-medium transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none">
        メッセージ
    </div>

    <script>
        /**
         * RetroScan Omni - Core Logic
         * Phase 2: 2027 Implementation Standards Applied.
         */
        
        // --- System WakeLock ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock is active');
                }
            } catch (err) { console.warn('Wake Lock error:', err); }
        }
        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; console.log('Wake Lock released'); });
            }
        }

        // --- UI Utilities ---
        const UI = {
            showLoading: (msg = '処理中...') => {
                document.getElementById('loading-text').innerText = msg;
                document.getElementById('loading-overlay').style.display = 'flex';
                requestWakeLock();
            },
            hideLoading: () => {
                document.getElementById('loading-overlay').style.display = 'none';
                releaseWakeLock();
            },
            showToast: (msg, duration = 3000) => {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.style.opacity = '1';
                t.style.transform = 'translate(-50%, 0)';
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translate(-50%, -20px)';
                }, duration);
            },
            confirm: (title, desc, okText = 'OK', okColor = 'bg-red-600') => {
                return new Promise((resolve) => {
                    const m = document.getElementById('custom-modal');
                    const content = document.getElementById('modal-content');
                    const btnOk = document.getElementById('modal-btn-ok');
                    const btnCancel = document.getElementById('modal-btn-cancel');
                    
                    document.getElementById('modal-title').innerText = title;
                    document.getElementById('modal-desc').innerText = desc;
                    btnOk.innerText = okText;
                    btnOk.className = `px-4 py-2 rounded-lg text-white font-medium ${okColor}`;
                    
                    m.style.display = 'flex';
                    setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);

                    const cleanup = () => {
                        content.classList.replace('scale-100', 'scale-95');
                        setTimeout(() => { m.style.display = 'none'; }, 200);
                        btnOk.removeEventListener('click', onOk);
                        btnCancel.removeEventListener('click', onCancel);
                    };

                    const onOk = () => { cleanup(); resolve(true); };
                    const onCancel = () => { cleanup(); resolve(false); };

                    btnOk.addEventListener('click', onOk);
                    btnCancel.addEventListener('click', onCancel);
                });
            },
            switchScreen: (screenId) => {
                ['screen-home', 'screen-edit', 'screen-gallery'].forEach(id => {
                    document.getElementById(id).classList.add('hidden');
                });
                document.getElementById(screenId).classList.remove('hidden');
            }
        };

        // --- State Management ---
        const State = {
            rawImages: [], // Array of File/Blob (Proxy)
            processedItems: [], // Array of { dataUrl, blob, settings }
            currentEditIndex: 0,
            currentImage: null, // HTMLImageElement
            previewScale: 1, // 画面フィットのためのスケール
            corners: [], // [{x, y}, ...] in image coordinates
            activeCorner: -1,
            rotation: 0, // 0, 90, 180, 270
            effect: 'none', // none, grayscale, color-revive
            exportMaxSize: 3000,
            exportQuality: 1.0,
            
            resetEditState: () => {
                State.corners = [];
                State.activeCorner = -1;
                State.rotation = 0;
                State.effect = 'none';
                document.querySelectorAll('.effect-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-gray-800', 'text-gray-300');
                });
                document.querySelector('.effect-btn[data-effect="none"]').classList.add('bg-blue-600', 'text-white');
                document.querySelector('.effect-btn[data-effect="none"]').classList.remove('bg-gray-800', 'text-gray-300');
            }
        };

        // --- Canvas Setup ---
        const container = document.getElementById('crop-container');
        const imgCanvas = document.getElementById('image-canvas');
        const imgCtx = imgCanvas.getContext('2d', { willReadFrequently: true });
        const uiCanvas = document.getElementById('ui-canvas');
        const uiCtx = uiCanvas.getContext('2d');
        const magDiv = document.getElementById('magnifier');
        const magCanvas = document.getElementById('magnifier-canvas');
        const magCtx = magCanvas.getContext('2d');

        // --- Core Algorithm: 遠近法補正 (Perspective Transform via Inverse Mapping) ---
        // GPUクリッピングバグを回避するため、ピクセル単位の逆マッピングアルゴリズムに刷新
        async function processPerspectiveAndEffect(sourceImg, srcCorners, destWidth, destHeight, effectType) {
            return new Promise((resolve) => {
                // 元画像を一時Canvasに描画してピクセルデータを取得
                const srcCanvas = document.createElement('canvas');
                srcCanvas.width = sourceImg.width;
                srcCanvas.height = sourceImg.height;
                const srcCtx = srcCanvas.getContext('2d', { willReadFrequently: true });
                srcCtx.drawImage(sourceImg, 0, 0);
                const srcDataObj = srcCtx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
                const srcData = srcDataObj.data;
                const sw = srcCanvas.width;
                const sh = srcCanvas.height;

                // 出力用Canvasの作成
                const destW = Math.round(destWidth);
                const destH = Math.round(destHeight);
                const destCanvas = document.createElement('canvas');
                destCanvas.width = destW;
                destCanvas.height = destH;
                const destCtx = destCanvas.getContext('2d', { willReadFrequently: true });
                const destDataObj = destCtx.createImageData(destW, destH);
                const destData = destDataObj.data;

                const p0 = srcCorners[0], p1 = srcCorners[1], p2 = srcCorners[2], p3 = srcCorners[3];

                // 逆マッピングループ (出力先の座標から元画像の座標を計算)
                for (let y = 0; y < destH; y++) {
                    const v = y / (destH - 1 || 1);
                    const invV = 1 - v;
                    
                    const p0x_v = invV * p0.x, p0y_v = invV * p0.y;
                    const p1x_v = invV * p1.x, p1y_v = invV * p1.y;
                    const p2x_v = v * p2.x,    p2y_v = v * p2.y;
                    const p3x_v = v * p3.x,    p3y_v = v * p3.y;

                    for (let x = 0; x < destW; x++) {
                        const u = x / (destW - 1 || 1);
                        const invU = 1 - u;

                        // Bilinear補間によるソース座標 (sx, sy) の計算
                        const sx = invU * (p0x_v + p3x_v) + u * (p1x_v + p2x_v);
                        const sy = invU * (p0y_v + p3y_v) + u * (p1y_v + p2y_v);

                        const srcX = Math.round(sx);
                        const srcY = Math.round(sy);
                        const dstIdx = (y * destW + x) * 4;

                        // 範囲内であれば色をコピー
                        if (srcX >= 0 && srcX < sw && srcY >= 0 && srcY < sh) {
                            const srcIdx = (srcY * sw + srcX) * 4;
                            destData[dstIdx]     = srcData[srcIdx];
                            destData[dstIdx + 1] = srcData[srcIdx + 1];
                            destData[dstIdx + 2] = srcData[srcIdx + 2];
                            destData[dstIdx + 3] = srcData[srcIdx + 3];
                        } else {
                            destData[dstIdx + 3] = 0; // 範囲外は透明
                        }
                    }
                }

                // --- エフェクト処理 ---
                if (effectType !== 'none') {
                    if (effectType === 'grayscale') {
                        for (let i = 0; i < destData.length; i += 4) {
                            if (destData[i+3] === 0) continue;
                            const avg = destData[i] * 0.299 + destData[i+1] * 0.587 + destData[i+2] * 0.114;
                            destData[i] = destData[i+1] = destData[i+2] = avg;
                        }
                    } else if (effectType === 'color-revive') {
                        let minR = 255, maxR = 0, minG = 255, maxG = 0, minB = 255, maxB = 0;
                        for (let i = 0; i < destData.length; i += 40) {
                            if (destData[i+3] === 0) continue;
                            if(destData[i]<minR) minR=destData[i]; if(destData[i]>maxR) maxR=destData[i];
                            if(destData[i+1]<minG) minG=destData[i+1]; if(destData[i+1]>maxG) maxG=destData[i+1];
                            if(destData[i+2]<minB) minB=destData[i+2]; if(destData[i+2]>maxB) maxB=destData[i+2];
                        }
                        const rangeR = maxR - minR || 1;
                        const rangeG = maxG - minG || 1;
                        const rangeB = maxB - minB || 1;
                        for (let i = 0; i < destData.length; i += 4) {
                            if (destData[i+3] === 0) continue;
                            destData[i]   = (destData[i] - minR) * 255 / rangeR;
                            destData[i+1] = (destData[i+1] - minG) * 255 / rangeG;
                            destData[i+2] = (destData[i+2] - minB) * 255 / rangeB;
                        }
                    }
                }

                destCtx.putImageData(destDataObj, 0, 0);
                resolve(destCanvas);
            });
        }

        // --- Edit Screen Logic ---

        function loadEditScreen(index) {
            State.currentEditIndex = index;
            document.getElementById('edit-counter').innerText = `${index + 1} / ${State.rawImages.length}`;
            State.resetEditState();
            
            UI.showLoading('画像展開中...');
            
            const file = State.rawImages[index];
            const url = URL.createObjectURL(file);
            const img = new Image();
            
            img.onload = () => {
                State.currentImage = img;
                // メモリクラッシュ防止: 編集画面用のプレビューは最大長辺1200pxに制限
                const MAX_PREVIEW = 1200;
                let w = img.width, h = img.height;
                if (Math.max(w, h) > MAX_PREVIEW) {
                    const ratio = MAX_PREVIEW / Math.max(w, h);
                    w *= ratio; h *= ratio;
                }
                
                imgCanvas.width = w;
                imgCanvas.height = h;
                imgCtx.drawImage(img, 0, 0, w, h);
                
                UI.switchScreen('screen-edit');
                
                // UIが完全に展開されてからサイズ計算と描画を実行 (表示バグ回避)
                requestAnimationFrame(() => {
                    updateUIBounds();

                    // 初期四隅 (15%マージン)
                    const marginX = w * 0.15;
                    const marginY = h * 0.15;
                    State.corners = [
                        { x: marginX, y: marginY }, // TL
                        { x: w - marginX, y: marginY }, // TR
                        { x: w - marginX, y: h - marginY }, // BR
                        { x: marginX, y: h - marginY } // BL
                    ];

                    drawUI();
                    UI.hideLoading();
                });
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        let containerRect = null;
        function updateUIBounds() {
            containerRect = container.getBoundingClientRect();
            // Containerのサイズと画像のアスペクト比から、実際の描画サイズとオフセットを計算
            const cw = containerRect.width;
            const ch = containerRect.height;
            const iw = imgCanvas.width;
            const ih = imgCanvas.height;
            
            const scale = Math.min(cw / iw, ch / ih);
            State.previewScale = scale;
            
            uiCanvas.width = cw;
            uiCanvas.height = ch;
        }

        function imgToScreen(x, y) {
            const cw = uiCanvas.width;
            const ch = uiCanvas.height;
            const dw = imgCanvas.width * State.previewScale;
            const dh = imgCanvas.height * State.previewScale;
            const ox = (cw - dw) / 2;
            const oy = (ch - dh) / 2;
            
            // 回転を考慮 (プレビューの見た目上)
            let cx = imgCanvas.width / 2;
            let cy = imgCanvas.height / 2;
            
            let dx = x - cx;
            let dy = y - cy;
            
            let rad = State.rotation * Math.PI / 180;
            let nx = dx * Math.cos(rad) - dy * Math.sin(rad);
            let ny = dx * Math.sin(rad) + dy * Math.cos(rad);

            return {
                x: ox + (nx + cx) * State.previewScale,
                y: oy + (ny + cy) * State.previewScale
            };
        }

        function screenToImg(sx, sy) {
            const cw = uiCanvas.width;
            const ch = uiCanvas.height;
            const dw = imgCanvas.width * State.previewScale;
            const dh = imgCanvas.height * State.previewScale;
            const ox = (cw - dw) / 2;
            const oy = (ch - dh) / 2;

            let nx = (sx - ox) / State.previewScale;
            let ny = (sy - oy) / State.previewScale;

            let cx = imgCanvas.width / 2;
            let cy = imgCanvas.height / 2;
            nx -= cx; ny -= cy;

            let rad = -State.rotation * Math.PI / 180;
            let px = nx * Math.cos(rad) - ny * Math.sin(rad);
            let py = nx * Math.sin(rad) + ny * Math.cos(rad);

            return {
                x: px + cx,
                y: py + cy
            };
        }

        function drawUI() {
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            if (State.corners.length !== 4) return;

            const sc = State.corners.map(c => imgToScreen(c.x, c.y));

            // 暗いオーバーレイ
            uiCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            uiCtx.beginPath();
            uiCtx.moveTo(0, 0); uiCtx.lineTo(uiCanvas.width, 0); uiCtx.lineTo(uiCanvas.width, uiCanvas.height); uiCtx.lineTo(0, uiCanvas.height); uiCtx.closePath();
            uiCtx.moveTo(sc[0].x, sc[0].y); uiCtx.lineTo(sc[3].x, sc[3].y); uiCtx.lineTo(sc[2].x, sc[2].y); uiCtx.lineTo(sc[1].x, sc[1].y); uiCtx.closePath();
            uiCtx.fill('evenodd');

            // 枠線
            uiCtx.strokeStyle = '#3b82f6';
            uiCtx.lineWidth = 2;
            uiCtx.beginPath();
            uiCtx.moveTo(sc[0].x, sc[0].y); uiCtx.lineTo(sc[1].x, sc[1].y); uiCtx.lineTo(sc[2].x, sc[2].y); uiCtx.lineTo(sc[3].x, sc[3].y); uiCtx.closePath();
            uiCtx.stroke();

            // コーナーハンドル
            sc.forEach((c, i) => {
                uiCtx.beginPath();
                uiCtx.arc(c.x, c.y, 12, 0, Math.PI * 2);
                uiCtx.fillStyle = i === State.activeCorner ? '#60a5fa' : '#3b82f6';
                uiCtx.fill();
                uiCtx.strokeStyle = '#fff';
                uiCtx.lineWidth = 2;
                uiCtx.stroke();
            });
        }

        function updateMagnifier(sx, sy, imgP) {
            magDiv.style.display = 'block';
            
            // 指で隠れない位置にルーペを移動 (左上 or 右上)
            if (sx < window.innerWidth / 2) {
                magDiv.style.left = (window.innerWidth - 120) + 'px';
            } else {
                magDiv.style.left = '20px';
            }
            magDiv.style.top = '20px';

            const zoom = 2; // ルーペの倍率
            const mw = magCanvas.width = 100;
            const mh = magCanvas.height = 100;
            
            magCtx.clearRect(0,0,mw,mh);
            
            // 背景を黒に
            magCtx.fillStyle = '#000';
            magCtx.fillRect(0,0,mw,mh);

            // 描画 (元画像から切り出し)
            magCtx.save();
            magCtx.translate(mw/2, mh/2);
            magCtx.rotate(State.rotation * Math.PI / 180);
            
            const srcSize = 100 / zoom / State.previewScale;
            magCtx.drawImage(
                imgCanvas, 
                imgP.x - srcSize/2, imgP.y - srcSize/2, srcSize, srcSize,
                -mw/2, -mh/2, mw, mh
            );
            magCtx.restore();
            
            // エフェクト反映 (見た目のみ)
            if(State.effect !== 'none') {
                magCtx.fillStyle = State.effect === 'grayscale' ? 'rgba(100,100,100,0.5)' : 'rgba(255,200,150,0.2)';
                magCtx.globalCompositeOperation = 'color';
                magCtx.fillRect(0,0,mw,mh);
            }
        }

        // --- Touch / Mouse Events on Canvas ---
        let isDragging = false;
        
        function getEventPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX - containerRect.left, y: e.touches[0].clientY - containerRect.top };
            }
            return { x: e.clientX - containerRect.left, y: e.clientY - containerRect.top };
        }

        function onDown(e) {
            if (State.corners.length !== 4) return;
            const pos = getEventPos(e);
            
            // 一番近いコーナーを探す (タッチ判定を広く 40px)
            let minDist = 40;
            let active = -1;
            
            const sc = State.corners.map(c => imgToScreen(c.x, c.y));
            sc.forEach((c, i) => {
                const dist = Math.hypot(c.x - pos.x, c.y - pos.y);
                if (dist < minDist) { minDist = dist; active = i; }
            });

            if (active !== -1) {
                isDragging = true;
                State.activeCorner = active;
                drawUI();
                e.preventDefault(); // スクロール防止
            }
        }

        function onMove(e) {
            if (!isDragging || State.activeCorner === -1) return;
            e.preventDefault();
            
            const pos = getEventPos(e);
            // 画面座標から画像座標へ変換して制限
            let imgP = screenToImg(pos.x, pos.y);
            imgP.x = Math.max(0, Math.min(imgCanvas.width, imgP.x));
            imgP.y = Math.max(0, Math.min(imgCanvas.height, imgP.y));
            
            State.corners[State.activeCorner] = imgP;
            drawUI();
            updateMagnifier(pos.x + containerRect.left, pos.y + containerRect.top, imgP);
        }

        function onUp(e) {
            if (isDragging) {
                isDragging = false;
                State.activeCorner = -1;
                magDiv.style.display = 'none';
                drawUI();
            }
        }

        container.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        container.addEventListener('touchstart', onDown, {passive: false});
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('touchend', onUp);
        window.addEventListener('resize', () => {
            if (!document.getElementById('screen-edit').classList.contains('hidden')) {
                updateUIBounds(); drawUI();
            }
        });

        // --- Tools & Export ---
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tool-btn').forEach(b => {
                    b.classList.remove('text-blue-400'); b.classList.add('text-gray-400');
                });
                const t = e.currentTarget;
                t.classList.remove('text-gray-400'); t.classList.add('text-blue-400');
                
                if (t.dataset.tool === 'filter') {
                    document.getElementById('effect-options').classList.remove('hidden');
                    document.getElementById('tool-hint').innerText = "お好みのエフェクトを選択してください";
                } else {
                    document.getElementById('effect-options').classList.add('hidden');
                    document.getElementById('tool-hint').innerText = "四隅の青い丸をドラッグして、写真の枠に合わせてください";
                }
            });
        });

        document.querySelectorAll('.effect-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.effect-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-gray-800', 'text-gray-300');
                });
                const t = e.currentTarget;
                t.classList.remove('bg-gray-800', 'text-gray-300');
                t.classList.add('bg-blue-600', 'text-white');
                State.effect = t.dataset.effect;
                
                // CSS filter for quick preview
                if(State.effect === 'grayscale') imgCanvas.style.filter = 'grayscale(100%)';
                else if(State.effect === 'color-revive') imgCanvas.style.filter = 'contrast(1.2) saturate(1.5)';
                else imgCanvas.style.filter = 'none';
            });
        });

        document.getElementById('btn-rotate').addEventListener('click', () => {
            State.rotation = (State.rotation + 90) % 360;
            imgCanvas.style.transform = `rotate(${State.rotation}deg)`;
            updateUIBounds();
            drawUI();
        });

        // "次へ" 処理（画像を確定してギャラリーへ、または次の画像へ）
        document.getElementById('btn-edit-done').addEventListener('click', async () => {
            UI.showLoading('画像処理中... (高画質演算)');
            
            // 元画像 (Full Resolution) を読み込んで処理
            const file = State.rawImages[State.currentEditIndex];
            const url = URL.createObjectURL(file);
            const img = new Image();
            
            await new Promise((resolve) => {
                img.onload = async () => {
                    // スケール計算 (プレビュー -> 元画像)
                    const scaleX = img.width / imgCanvas.width;
                    const scaleY = img.height / imgCanvas.height;
                    
                    const fullCorners = State.corners.map(c => ({ x: c.x * scaleX, y: c.y * scaleY }));
                    
                    // 回転を考慮したCornersの並べ替え
                    let finalCorners = [...fullCorners];
                    if (State.rotation === 90) finalCorners = [fullCorners[3], fullCorners[0], fullCorners[1], fullCorners[2]];
                    else if (State.rotation === 180) finalCorners = [fullCorners[2], fullCorners[3], fullCorners[0], fullCorners[1]];
                    else if (State.rotation === 270) finalCorners = [fullCorners[1], fullCorners[2], fullCorners[3], fullCorners[0]];

                    // 出力サイズの計算 (四角形の最大幅・高さを採用)
                    const w1 = Math.hypot(finalCorners[0].x - finalCorners[1].x, finalCorners[0].y - finalCorners[1].y);
                    const w2 = Math.hypot(finalCorners[2].x - finalCorners[3].x, finalCorners[2].y - finalCorners[3].y);
                    const h1 = Math.hypot(finalCorners[1].x - finalCorners[2].x, finalCorners[1].y - finalCorners[2].y);
                    const h2 = Math.hypot(finalCorners[3].x - finalCorners[0].x, finalCorners[3].y - finalCorners[0].y);
                    const destW = Math.max(w1, w2);
                    const destH = Math.max(h1, h2);

                    // コアアルゴリズム実行
                    const resultCanvas = await processPerspectiveAndEffect(img, finalCorners, destW, destH, State.effect);
                    
                    // Blobとして保存 (メモリ節約)
                    resultCanvas.toBlob((blob) => {
                        const dataUrl = URL.createObjectURL(blob);
                        State.processedItems.push({ blob, dataUrl });
                        URL.revokeObjectURL(url);
                        resolve();
                    }, 'image/jpeg', 0.9); // 中間状態は0.9固定
                };
                img.src = url;
            });

            UI.hideLoading();

            // クリーンアップ
            imgCanvas.style.filter = 'none';
            imgCanvas.style.transform = 'none';

            if (State.currentEditIndex + 1 < State.rawImages.length) {
                // 次の画像へ
                loadEditScreen(State.currentEditIndex + 1);
            } else {
                // 全て完了 -> ギャラリーへ
                buildGallery();
                UI.switchScreen('screen-gallery');
            }
        });

        document.getElementById('btn-edit-cancel').addEventListener('click', async () => {
            const ok = await UI.confirm('編集を中止', 'この画像の編集をスキップしますか？', 'スキップ');
            if (ok) {
                imgCanvas.style.filter = 'none';
                imgCanvas.style.transform = 'none';
                if (State.currentEditIndex + 1 < State.rawImages.length) {
                    loadEditScreen(State.currentEditIndex + 1);
                } else {
                    if (State.processedItems.length > 0) {
                        buildGallery(); UI.switchScreen('screen-gallery');
                    } else {
                        UI.switchScreen('screen-home');
                        State.rawImages = [];
                    }
                }
            }
        });

        // --- Gallery & Export ---
        
        function buildGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            document.getElementById('gallery-count').innerText = State.processedItems.length;

            State.processedItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'relative aspect-[3/4] bg-gray-800 rounded-lg overflow-hidden border border-gray-700 shadow-md group';
                
                const img = document.createElement('img');
                img.src = item.dataUrl;
                img.className = 'w-full h-full object-cover';
                
                // 削除ボタン (Trash)
                const delBtn = document.createElement('button');
                delBtn.className = 'absolute top-2 right-2 bg-red-600/90 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform';
                delBtn.innerHTML = '<i class="fas fa-trash-alt text-sm"></i>';
                delBtn.onclick = async () => {
                    const ok = await UI.confirm('画像を削除', 'この画像をスキャン結果から削除しますか？', '削除');
                    if (ok) {
                        URL.revokeObjectURL(item.dataUrl);
                        State.processedItems.splice(index, 1);
                        buildGallery();
                        if (State.processedItems.length === 0) {
                            UI.switchScreen('screen-home');
                        }
                    }
                };
                
                // 個別ダウンロードボタン (ZIPなし対応)
                const dlBtn = document.createElement('button');
                dlBtn.className = 'absolute bottom-2 right-2 bg-blue-600/90 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform';
                dlBtn.innerHTML = '<i class="fas fa-download"></i>';
                dlBtn.onclick = () => downloadSingle(index);

                div.appendChild(img);
                div.appendChild(delBtn);
                div.appendChild(dlBtn);
                grid.appendChild(div);
            });
        }

        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.quality-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'font-medium');
                    b.classList.add('text-gray-400');
                });
                const t = e.currentTarget;
                t.classList.remove('text-gray-400');
                t.classList.add('bg-blue-600', 'text-white', 'font-medium');
                State.exportMaxSize = parseInt(t.dataset.size);
                State.exportQuality = parseFloat(t.dataset.quality);
            });
        });

        async function createExportBlob(sourceBlob, maxSize, quality) {
            return new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(sourceBlob);
                img.onload = () => {
                    let w = img.width;
                    let h = img.height;
                    
                    if (Math.max(w, h) > maxSize) {
                        const ratio = maxSize / Math.max(w, h);
                        w *= ratio;
                        h *= ratio;
                    } else if (quality >= 0.95) {
                        // リサイズ不要かつ最高画質の場合は元Blobを返す
                        URL.revokeObjectURL(url);
                        resolve(sourceBlob);
                        return;
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = w; 
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    canvas.toBlob(b => {
                        URL.revokeObjectURL(url);
                        resolve(b);
                    }, 'image/jpeg', quality);
                };
                img.src = url;
            });
        }

        // 個別ダウンロード
        async function downloadSingle(index) {
            UI.showLoading('画像を作成中...');
            const item = State.processedItems[index];
            const finalBlob = await createExportBlob(item.blob, State.exportMaxSize, State.exportQuality);
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(finalBlob);
            a.download = `Scan_${Date.now()}_${index+1}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            
            UI.hideLoading();
            UI.showToast('保存しました');
        }

        // ZIP一括ダウンロード
        document.getElementById('btn-export-zip').addEventListener('click', async () => {
            if (State.processedItems.length === 0) return;
            UI.showLoading('ZIPを作成中... (画面を閉じないでください)');
            
            try {
                const zip = new JSZip();
                for (let i = 0; i < State.processedItems.length; i++) {
                    const finalBlob = await createExportBlob(State.processedItems[i].blob, State.exportMaxSize, State.exportQuality);
                    zip.file(`RetroScan_${i+1}.jpg`, finalBlob);
                }
                
                const content = await zip.generateAsync({type: 'blob'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = `RetroScan_Archive_${Date.now()}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
                
                UI.hideLoading();
                UI.showToast('ZIPファイルを保存しました');
            } catch (e) {
                UI.hideLoading();
                UI.showToast('エラーが発生しました');
                console.error(e);
            }
        });

        document.getElementById('btn-gallery-back').addEventListener('click', async () => {
            const ok = await UI.confirm('終了しますか？', 'ホームに戻ると、スキャンしたデータは全て消去されます。', '終了して戻る');
            if (ok) {
                State.rawImages = [];
                State.processedItems.forEach(i => URL.revokeObjectURL(i.dataUrl));
                State.processedItems = [];
                UI.switchScreen('screen-home');
            }
        });

        // --- File Input Handlers ---
        
        async function normalizeImage(file) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    let w = img.width;
                    let h = img.height;
                    const MAX_SIZE = 3000;
                    
                    if (Math.max(w, h) > MAX_SIZE) {
                        const ratio = MAX_SIZE / Math.max(w, h);
                        w *= ratio;
                        h *= ratio;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    canvas.toBlob((blob) => {
                        URL.revokeObjectURL(url);
                        resolve(blob);
                    }, 'image/jpeg', 0.95);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error("Image load failed"));
                };
                img.src = url;
            });
        }

        let isAppendingMode = false; // 追加スキャンフラグ

        async function handleFiles(files) {
            if (files.length === 0) return;
            
            let targetFiles = Array.from(files);
            if (targetFiles.length > 20) {
                UI.showToast('一度に処理できるのは20枚までです');
                targetFiles = targetFiles.slice(0, 20);
            }
            
            UI.showLoading('画像を最適化中...');
            
            if (!isAppendingMode) {
                State.processedItems = [];
            }
            State.rawImages = [];
            
            try {
                for (let i = 0; i < targetFiles.length; i++) {
                    const blob = await normalizeImage(targetFiles[i]);
                    State.rawImages.push(blob);
                }
            } catch(e) {
                console.error(e);
                UI.showToast('一部の画像の読み込みに失敗しました');
            }
            
            UI.hideLoading();
            
            if (State.rawImages.length > 0) {
                loadEditScreen(0);
            } else if (isAppendingMode && State.processedItems.length > 0) {
                UI.switchScreen('screen-gallery');
            }
            
            isAppendingMode = false;
        }

        document.getElementById('btn-camera').addEventListener('click', () => {
            isAppendingMode = false;
            document.getElementById('file-input').removeAttribute('capture');
            document.getElementById('file-input').setAttribute('capture', 'environment');
            document.getElementById('file-input').click();
        });

        document.getElementById('btn-file').addEventListener('click', () => {
            isAppendingMode = false;
            document.getElementById('file-input').removeAttribute('capture');
            document.getElementById('file-input').click();
        });

        // ギャラリーからの追加カメラ
        document.getElementById('btn-add-camera').addEventListener('click', () => {
            isAppendingMode = true;
            document.getElementById('file-input').removeAttribute('capture');
            document.getElementById('file-input').setAttribute('capture', 'environment');
            document.getElementById('file-input').click();
        });

        // ギャラリーからの追加ファイル
        document.getElementById('btn-add-file').addEventListener('click', () => {
            isAppendingMode = true;
            document.getElementById('file-input').removeAttribute('capture');
            document.getElementById('file-input').click();
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            handleFiles(e.target.files);
            e.target.value = ''; // Reset
        });

        // PWA Offline Ready Signal (Adom's Lab Protocol)
        console.log("[Adom's Lab] App Initialized. Safe to cache: index.html");

    </script>
</body>
</html>
